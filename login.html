<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login / Signup - CreatorMastery</title>

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  
    <style>
    .auth-wrap{min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px}
    .auth-card{background:rgba(255,255,255,0.02);padding:28px;border-radius:12px;max-width:420px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.02)}
    .auth-card h3{margin-bottom:12px}
    .form-group{margin-bottom:12px}
    input[type="email"], input[type="password"]{width:100%;padding:12px;border-radius:8px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff}
    .muted{color:#aeb6ba;font-size:0.9rem}
    .auth-actions{display:flex;gap:8px;margin-top:14px}
  </style>
</head>
<body>
  <header id="main-header"><div class="container nav-row"><div class="logo">CreatorMastery</div></div></header>

  <main>
    <section class="auth-wrap">
      <div class="auth-card">
        <h3>Login / Signup</h3>
        <div class="form-group">
          <input id="auth-email" type="email" placeholder="Email">
        </div>
        <div class="form-group">
          <input id="auth-password" type="password" placeholder="Password">
        </div>
        
        <div class="auth-actions">
                    <button id="btn-signup" class="cta-small">Sign Up</button>
          <button id="btn-login" class="secondary-btn">Login</button>
        </div>

        <button id="btn-google" class="cta-small" style="margin-top: 10px; background-color: #db4437; width: 100%;">
            <i class="fab fa-google"></i> Sign in with Google
        </button>
        
        <p class="muted" style="margin-top:12px">Use the buttons above to register or log in.</p>
        
        <div style="margin-top:10px">
          <a href="index.html" class="secondary-btn">Back to Home</a>
        </div>
      </div>
    </section>
  </main>

  
      <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

  <script>
      // --- 1. CONFIGURATION (The Link to Firebase) ---
      const firebaseConfig = {
        apiKey: "AIzaSyDm8E8-ChFrlkoeyx6FXYcWexaCUQOHjRA",
        authDomain: "creatormastery-11936.firebaseapp.com",
        projectId: "creatormastery-11936",
        storageBucket: "creatormastery-11936.firebasestorage.app",
        messagingSenderId: "948465890036",
        appId: "1:948465890036:web:53e276d38a6701a79224a1",
        measurementId: "G-64VEW9VF9T"
      };

      // Initialize Firebase and Auth
      const app = firebase.initializeApp(firebaseConfig);
      const auth = app.auth();

      // --- 2. Firebase AUTH Functions ---
      
      function handleRegister() {
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;
          
          auth.createUserWithEmailAndPassword(email, password)
              .then(() => {
                  window.location.href = 'course.html';
              })
              .catch((error) => {
                  alert('Registration failed: ' + error.message);
              });
      }

      function handleLogin() {
          const email = document.getElementById('auth-email').value;
          const password = document.getElementById('auth-password').value;

          auth.signInWithEmailAndPassword(email, password)
              .then(() => {
                  window.location.href = 'course.html';
              })
              .catch((error) => {
                  alert('Login failed: ' + error.message);
              });
      }

      function signInWithGoogle() {
          const provider = new firebase.auth.GoogleAuthProvider();

          auth.signInWithPopup(provider)
              .then(() => {
                  window.location.href = 'course.html';
              })
              .catch((error) => {
                  alert('Google Sign-in failed: ' + error.message);
              });
      }

      // --- 3. CONNECT BUTTONS TO FUNCTIONS ---
      document.getElementById('btn-login').addEventListener('click', handleLogin);
      document.getElementById('btn-signup').addEventListener('click', handleRegister);
      document.getElementById('btn-google').addEventListener('click', signInWithGoogle);
  </script>
  </body>
</html>
